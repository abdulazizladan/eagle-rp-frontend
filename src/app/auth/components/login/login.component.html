<div id="main" fxLayout="column" fxLayoutAlign="center center">
  <mat-card [formGroup]="loginForm" fxLayout="column" fxLayoutGap="25px">
      <mat-toolbar color="accent">
        Login
      </mat-toolbar>
    <mat-card-content fxLayout="column" fxLayoutGap="25px">

      <mat-form-field appearance="outline">
        <mat-label>email</mat-label>
        <input matInput  type="email" formControlName="email">
        <mat-icon matSuffix>
          email
        </mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>password</mat-label>
      <input matInput type="password" formControlName="password">
      <mat-icon matSuffix>
        lock
      </mat-icon>
    </mat-form-field>
    </mat-card-content>
    <mat-divider></mat-divider>
    <mat-card-actions align="end">
      <button mat-flat-button color="accent" (click)="login()" [disabled]="loginForm.invalid">Login</button>
    </mat-card-actions>
  </mat-card>
</div>
