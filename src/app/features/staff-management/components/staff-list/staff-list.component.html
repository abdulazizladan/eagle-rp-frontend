<div fxLayout="column" fxLayoutGap="25px" *ngIf="staff$ | async as staff">
  <mat-toolbar fxLayout="column" fxLayoutGap="35px" class="mat-elevation-z4">
    <span></span>
    <mat-toolbar-row fxLayout="row" fxLayoutGap="20px">
      <mat-form-field appearance="outline" fxFlex="1 1 auto">
        <mat-label>Search</mat-label>
        <input matInput>
        <mat-icon matPrefix>
          search
        </mat-icon>
      </mat-form-field>
      <button mat-flat-button color="accent" (click)="openDialog()">
        <mat-icon>add</mat-icon>
        Add staff
      </button>
    </mat-toolbar-row>
  </mat-toolbar>

  <table mat-table [dataSource]="staff" class="mat-elevation-z4">

    <ng-container matColumnDef="id">
      <th mat-heaader-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let user">{{user.id}}</td>
    </ng-container>

    <ng-container matColumnDef="firstName">
      <th mat-heaader-cell *matHeaderCellDef> First name </th>
      <td mat-cell *matCellDef="let user">{{user.firstName}}</td>
    </ng-container>

    <ng-container matColumnDef="middleName">
      <th mat-heaader-cell *matHeaderCellDef> Middle name </th>
      <td mat-cell *matCellDef="let user">{{user.middleName}}</td>
    </ng-container>

    <ng-container matColumnDef="lastName">
      <th mat-heaader-cell *matHeaderCellDef> Last name </th>
      <td mat-cell *matCellDef="let user">{{user.lastName}}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-heaader-cell *matHeaderCellDef> Actions</th>
      <td mat-cell *matCellDef="let user">
        <button mat-flat-button color="accent" routerLink={{user.id}}>
          View profile
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</div>
