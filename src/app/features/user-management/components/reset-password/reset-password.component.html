<h1 matDialogTitle>Reset user password</h1>

<mat-dialog-content>
    Are you sure you want to send password reset link to this user?
</mat-dialog-content>

<mat-dialog-actions align="start">

  <button mat-flat-button color="warn" matDialogClose>Close dialog</button>
  <span fxFlex="1 1 auto"></span>
  <button mat-flat-button color="accent">Send reset link</button>

</mat-dialog-actions>
